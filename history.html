<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoScan — My Impact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --green-dark: #1a3a0a;
        --green-mid: #2d5016;
        --green-bright: #4caf50;
        --green-light: #e8f5e9;
        --amber: #ff9800;
        --red: #e53935;
        --blue: #1565c0;
        --text: #1c1c1c;
        --muted: #6b7280;
        --surface: #ffffff;
        --bg: #f4f7f2;
        --border: #e0e8dc;
        --grade-a: #2e7d32;
        --grade-b: #558b2f;
        --grade-c: #f9a825;
        --grade-d: #ef6c00;
        --grade-e: #c62828;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* ── Header ── */
      header {
        background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
        color: white;
        padding: 18px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      }

      .header-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: white;
      }

      .header-brand h1 { font-family: "DM Serif Display", serif; font-size: 1.6em; }

      nav a {
        color: rgba(255,255,255,0.85);
        text-decoration: none;
        margin-left: 20px;
        font-size: 0.9em;
        font-weight: 500;
        transition: color 0.2s;
      }

      nav a:hover, nav a.active { color: white; }

      /* ── Layout ── */
      .page {
        max-width: 900px;
        margin: 0 auto;
        padding: 28px 20px 60px;
      }

      .page-title {
        font-family: "DM Serif Display", serif;
        font-size: 2em;
        color: var(--green-mid);
        margin-bottom: 4px;
      }

      .page-subtitle {
        color: var(--muted);
        font-size: 0.95em;
        margin-bottom: 28px;
      }

      /* ── Empty state ── */
      .empty-state {
        background: var(--surface);
        border-radius: 16px;
        padding: 60px 40px;
        text-align: center;
        border: 2px dashed var(--border);
      }

      .empty-state .icon { font-size: 3.5em; margin-bottom: 16px; }
      .empty-state h3 { font-size: 1.3em; color: var(--green-mid); margin-bottom: 8px; }
      .empty-state p { color: var(--muted); margin-bottom: 24px; }

      .btn {
        display: inline-block;
        padding: 12px 28px;
        background: linear-gradient(135deg, var(--green-bright), #388e3c);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.95em;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 3px 10px rgba(76,175,80,0.3);
      }

      .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 16px rgba(76,175,80,0.4); }

      .btn-ghost {
        background: transparent;
        color: var(--muted);
        box-shadow: none;
        border: 1px solid var(--border);
        padding: 8px 18px;
        font-size: 0.85em;
      }

      .btn-ghost:hover { background: var(--bg); transform: none; box-shadow: none; }

      /* ── Summary cards row ── */
      .summary-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }

      .stat-card {
        background: var(--surface);
        border-radius: 14px;
        padding: 22px 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        border: 1px solid var(--border);
        position: relative;
        overflow: hidden;
      }

      .stat-card::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 4px;
        background: var(--green-bright);
      }

      .stat-card.amber::before { background: var(--amber); }
      .stat-card.blue::before { background: var(--blue); }

      .stat-label {
        font-size: 0.75em;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .stat-value {
        font-family: "DM Serif Display", serif;
        font-size: 2.4em;
        color: var(--green-mid);
        line-height: 1;
      }

      .stat-value.amber { color: var(--amber); }
      .stat-value.blue { color: var(--blue); }

      .stat-sub {
        font-size: 0.8em;
        color: var(--muted);
        margin-top: 4px;
      }

      .trend-pill {
        display: inline-block;
        font-size: 0.75em;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 20px;
        margin-top: 6px;
      }

      .trend-up { background: #e8f5e9; color: #2e7d32; }
      .trend-down { background: #ffebee; color: #c62828; }
      .trend-flat { background: #f5f5f5; color: #666; }

      /* ── Grade bar ── */
      .section-card {
        background: var(--surface);
        border-radius: 14px;
        padding: 24px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        border: 1px solid var(--border);
      }

      .section-card h3 {
        font-size: 0.8em;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 16px;
      }

      .grade-bars { display: flex; flex-direction: column; gap: 10px; }

      .grade-row {
        display: grid;
        grid-template-columns: 24px 1fr 36px;
        align-items: center;
        gap: 10px;
      }

      .grade-label {
        font-weight: 700;
        font-size: 0.9em;
        text-align: center;
        width: 24px;
        height: 24px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 0.8em;
      }

      .grade-a-bg { background: var(--grade-a); }
      .grade-b-bg { background: var(--grade-b); }
      .grade-c-bg { background: var(--grade-c); }
      .grade-d-bg { background: var(--grade-d); }
      .grade-e-bg { background: var(--grade-e); }

      .grade-bar-track {
        height: 10px;
        background: var(--bg);
        border-radius: 6px;
        overflow: hidden;
      }

      .grade-bar-fill {
        height: 100%;
        border-radius: 6px;
        transition: width 0.6s ease;
      }

      .grade-count { font-size: 0.85em; color: var(--muted); text-align: right; }

      /* ── Sparkline ── */
      .sparkline-wrap { display: flex; align-items: flex-end; gap: 6px; height: 60px; }

      .spark-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }

      .spark-bar-wrap {
        flex: 1;
        display: flex;
        align-items: flex-end;
        width: 100%;
        background: var(--bg);
        border-radius: 4px;
        overflow: hidden;
        min-height: 4px;
      }

      .spark-bar {
        width: 100%;
        background: linear-gradient(180deg, var(--green-bright), #388e3c);
        border-radius: 4px 4px 0 0;
        min-height: 4px;
        transition: height 0.4s ease;
      }

      .spark-day {
        font-size: 0.6em;
        color: var(--muted);
        text-align: center;
      }

      /* ── Flags / concerns ── */
      .flags-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
      }

      .flag-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 10px;
        background: var(--bg);
        border: 1px solid var(--border);
      }

      .flag-chip .flag-icon { font-size: 1.1em; }

      .flag-chip .flag-text { font-size: 0.82em; }
      .flag-chip .flag-name { font-weight: 600; color: var(--text); display: block; }
      .flag-chip .flag-count { color: var(--muted); }

      .flag-chip.flagged { background: #fff8e1; border-color: #ffe082; }

      /* ── Best / worst ── */
      .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

      @media (max-width: 520px) { .two-col { grid-template-columns: 1fr; } }

      .product-mini {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px;
        border-radius: 10px;
        background: var(--bg);
        border: 1px solid var(--border);
      }

      .product-mini img {
        width: 44px;
        height: 44px;
        object-fit: contain;
        border-radius: 6px;
        background: white;
        flex-shrink: 0;
      }

      .product-mini .no-img {
        width: 44px;
        height: 44px;
        background: var(--border);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4em;
        flex-shrink: 0;
      }

      .product-mini-info { min-width: 0; }
      .product-mini-name { font-weight: 600; font-size: 0.85em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .product-mini-brand { font-size: 0.75em; color: var(--muted); }

      .grade-badge {
        margin-left: auto;
        flex-shrink: 0;
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1em;
        color: white;
      }

      /* ── History list ── */
      .history-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .history-list { display: flex; flex-direction: column; gap: 10px; }

      .history-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        background: var(--surface);
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        transition: box-shadow 0.2s;
      }

      .history-item:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.08); }

      .history-item img {
        width: 42px;
        height: 42px;
        object-fit: contain;
        border-radius: 6px;
        background: var(--bg);
        flex-shrink: 0;
      }

      .history-item .no-img {
        width: 42px;
        height: 42px;
        background: var(--bg);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3em;
        flex-shrink: 0;
      }

      .history-item-info { flex: 1; min-width: 0; }
      .history-item-name { font-weight: 600; font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .history-item-meta { font-size: 0.75em; color: var(--muted); margin-top: 2px; }

      .history-item-score { text-align: right; flex-shrink: 0; }
      .history-item-score .score-num { font-family: "DM Serif Display", serif; font-size: 1.3em; }
      .history-item-score .score-grade { font-size: 0.7em; color: var(--muted); }

      .delete-btn {
        background: none;
        border: none;
        color: var(--border);
        cursor: pointer;
        font-size: 1em;
        padding: 4px;
        border-radius: 4px;
        transition: color 0.2s;
        flex-shrink: 0;
      }

      .delete-btn:hover { color: var(--red); }

      .show-more-wrap { text-align: center; margin-top: 14px; }

      /* ── Footer ── */
      footer {
        text-align: center;
        padding: 24px;
        color: var(--muted);
        font-size: 0.85em;
        border-top: 1px solid var(--border);
        margin-top: 20px;
      }

      /* ── Tabs ── */
      .tab-bar {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
        border-bottom: 2px solid var(--border);
        padding-bottom: 0;
      }

      .tab-btn {
        background: none;
        border: none;
        padding: 10px 18px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.88em;
        font-weight: 600;
        color: var(--muted);
        cursor: pointer;
        border-bottom: 3px solid transparent;
        margin-bottom: -2px;
        transition: color 0.15s, border-color 0.15s;
        display: flex;
        align-items: center;
        gap: 7px;
      }

      .tab-btn:hover { color: var(--text); }

      .tab-btn.active {
        color: var(--green-mid);
        border-bottom-color: var(--green-bright);
      }

      .tab-count {
        background: var(--green-bright);
        color: white;
        font-size: 0.7em;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 10px;
        min-width: 18px;
        text-align: center;
      }

      .tab-count.zero { background: var(--border); color: var(--muted); }

      /* ── Shortlist grid ── */
      .shortlist-summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 14px;
        margin-bottom: 22px;
      }

      .shortlist-empty {
        background: var(--surface);
        border-radius: 14px;
        padding: 50px 30px;
        text-align: center;
        border: 2px dashed var(--border);
      }

      .shortlist-empty .icon { font-size: 3em; margin-bottom: 14px; }
      .shortlist-empty h3 { color: var(--green-mid); margin-bottom: 8px; }
      .shortlist-empty p { color: var(--muted); font-size: 0.88em; line-height: 1.6; }

      .shortlist-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 14px;
      }

      .shortlist-card {
        background: var(--surface);
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: transform 0.2s, box-shadow 0.2s;
        position: relative;
      }

      .shortlist-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 16px rgba(0,0,0,0.09);
      }

      .shortlist-card-accent {
        height: 4px;
        background: linear-gradient(90deg, #f57c00, #e65100);
      }

      .shortlist-card img {
        width: 64px;
        height: 64px;
        object-fit: contain;
        display: block;
        margin: 14px auto 0;
        border-radius: 6px;
        background: var(--bg);
      }

      .shortlist-card .no-img {
        width: 64px;
        height: 64px;
        background: var(--bg);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8em;
        margin: 14px auto 0;
      }

      .shortlist-card-body {
        padding: 12px 14px 14px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .shortlist-card-name {
        font-weight: 700;
        font-size: 0.85em;
        margin-bottom: 2px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.35;
      }

      .shortlist-card-brand {
        font-size: 0.75em;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .shortlist-score-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: auto;
      }

      .shortlist-grade {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.85em;
        color: white;
        flex-shrink: 0;
      }

      .shortlist-score-bar-wrap {
        flex: 1;
        height: 6px;
        background: var(--bg);
        border-radius: 4px;
        overflow: hidden;
      }

      .shortlist-score-bar {
        height: 100%;
        border-radius: 4px;
      }

      .shortlist-score-num {
        font-family: "DM Serif Display", serif;
        font-size: 1em;
        flex-shrink: 0;
      }

      .shortlist-remove {
        position: absolute;
        top: 8px;
        right: 8px;
        background: none;
        border: none;
        color: var(--border);
        cursor: pointer;
        font-size: 0.9em;
        padding: 2px 5px;
        border-radius: 4px;
        transition: color 0.15s, background 0.15s;
        line-height: 1;
      }

      .shortlist-remove:hover { color: var(--red); background: #fff0f0; }

      .shortlist-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .shortlist-label {
        font-size: 0.8em;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header>
      <a class="header-brand" href="index.html">
        <span>🌱</span>
        <h1>EcoScan</h1>
      </a>
      <nav>
        <a href="scan.html">Scan</a>
        <a href="history.html" class="active">My Impact</a>
        <a href="alternatives.html">Alternatives</a>
      </nav>
    </header>

    <div class="page">
      <h2 class="page-title">My Impact</h2>

      <!-- Tab bar -->
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-history" onclick="switchTab('history')">
          📊 Weekly Impact
        </button>
        <button class="tab-btn" id="tab-shortlist" onclick="switchTab('shortlist')">
          ⭐ Shortlist
          <span class="tab-count zero" id="shortlist-count">0</span>
        </button>
      </div>

      <div id="panel-history">
        <p class="page-subtitle" style="margin-bottom:20px">Your sustainability snapshot for the last 7 days</p>
        <div id="content"></div>
      </div>

      <div id="panel-shortlist" style="display:none">
        <div id="shortlist-content"></div>
      </div>
    </div>

    <footer>
      <p>EcoScan &mdash; Making sustainability simple, one scan at a time.</p>
    </footer>

    <script src="history.js"></script>
    <script>
      // ── Colour helpers ────────────────────────────────────────────────────

      function gradeColor(grade) {
        return { A: "#2e7d32", B: "#558b2f", C: "#f9a825", D: "#ef6c00", E: "#c62828" }[grade] || "#999";
      }

      function scoreColor(score) {
        if (score >= 80) return "#2e7d32";
        if (score >= 65) return "#558b2f";
        if (score >= 50) return "#f9a825";
        if (score >= 35) return "#ef6c00";
        return "#c62828";
      }

      function gradeBgClass(grade) {
        return { A: "grade-a-bg", B: "grade-b-bg", C: "grade-c-bg", D: "grade-d-bg", E: "grade-e-bg" }[grade] || "";
      }

      function gradeFillColor(grade) {
        return { A: "#2e7d32", B: "#558b2f", C: "#f9a825", D: "#ef6c00", E: "#c62828" }[grade] || "#ccc";
      }

      function timeAgo(isoString) {
        const diff = (Date.now() - new Date(isoString)) / 1000;
        if (diff < 60) return "just now";
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        return `${Math.floor(diff / 86400)}d ago`;
      }

      function dayLabel(isoDate) {
        const d = new Date(isoDate + "T12:00:00");
        return d.toLocaleDateString("en-GB", { weekday: "short" }).slice(0, 2);
      }

      // ── Product thumbnail ─────────────────────────────────────────────────

      function thumbHtml(entry, size = 42) {
        if (entry.image) {
          return `<img src="${entry.image}" alt="${entry.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                  <div class="no-img" style="width:${size}px;height:${size}px;display:none">📦</div>`;
        }
        return `<div class="no-img" style="width:${size}px;height:${size}px">📦</div>`;
      }

      // ── Render ────────────────────────────────────────────────────────────

      function render() {
        const container = document.getElementById("content");
        const summary = HistoryModule.getWeeklySummary();
        const allHistory = HistoryModule.getHistory();

        if (!summary.hasData) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon">🛒</div>
              <h3>No scans yet this week</h3>
              <p>Start scanning products at the supermarket to see your weekly impact summary here.</p>
              <a href="scan.html" class="btn">📷 Start Scanning</a>
            </div>`;
          return;
        }

        // ── Trend pill ──
        let trendHtml = "";
        if (summary.trend !== null) {
          if (summary.trend > 0) {
            trendHtml = `<span class="trend-pill trend-up">↑ ${summary.trend} vs last week</span>`;
          } else if (summary.trend < 0) {
            trendHtml = `<span class="trend-pill trend-down">↓ ${Math.abs(summary.trend)} vs last week</span>`;
          } else {
            trendHtml = `<span class="trend-pill trend-flat">→ same as last week</span>`;
          }
        }

        // ── Grade bars ──
        const maxGrade = Math.max(...Object.values(summary.gradeCounts), 1);
        const gradeBarsHtml = ["A", "B", "C", "D", "E"].map((g) => `
          <div class="grade-row">
            <div class="grade-label ${gradeBgClass(g)}">${g}</div>
            <div class="grade-bar-track">
              <div class="grade-bar-fill" style="width:${(summary.gradeCounts[g] / maxGrade) * 100}%;background:${gradeFillColor(g)}"></div>
            </div>
            <div class="grade-count">${summary.gradeCounts[g]}</div>
          </div>`).join("");

        // ── Sparkline ──
        const dayCounts = Object.entries(summary.dailyCounts);
        const maxDay = Math.max(...dayCounts.map(([, v]) => v), 1);
        const sparkHtml = dayCounts.map(([date, count]) => `
          <div class="spark-col">
            <div class="spark-bar-wrap" style="height:44px">
              <div class="spark-bar" style="height:${Math.max((count / maxDay) * 44, count > 0 ? 4 : 0)}px"></div>
            </div>
            <div class="spark-day">${dayLabel(date)}</div>
          </div>`).join("");

        // ── Flags ──
        const flagDefs = [
          { key: "palm_oil", icon: "🌴", name: "Palm oil" },
          { key: "ultra_processed", icon: "🏭", name: "Ultra-processed" },
          { key: "plastic_packaging", icon: "♻️", name: "Plastic packaging" },
          { key: "imported", icon: "✈️", name: "Imported" },
          { key: "high_additives", icon: "🧪", name: "High additives" },
        ];
        const flagsHtml = flagDefs.map(({ key, icon, name }) => {
          const count = summary.flagCounts[key];
          return `<div class="flag-chip ${count > 0 ? "flagged" : ""}">
            <span class="flag-icon">${icon}</span>
            <span class="flag-text">
              <span class="flag-name">${name}</span>
              <span class="flag-count">${count} of ${summary.totalScans} scans</span>
            </span>
          </div>`;
        }).join("");

        // ── Best / worst ──
        function miniCard(entry, label) {
          return `
            <div>
              <p style="font-size:0.75em;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:8px">${label}</p>
              <div class="product-mini">
                ${thumbHtml(entry, 44)}
                <div class="product-mini-info">
                  <div class="product-mini-name">${entry.name}</div>
                  <div class="product-mini-brand">${entry.brand}</div>
                </div>
                <div class="grade-badge ${gradeBgClass(entry.grade)}">${entry.grade}</div>
              </div>
            </div>`;
        }

        // ── History list (show first 10, expandable) ──
        let visibleCount = 10;

        function historyListHtml(limit) {
          return allHistory.slice(0, limit).map((entry) => `
            <div class="history-item" data-id="${entry.id}">
              ${thumbHtml(entry)}
              <div class="history-item-info">
                <div class="history-item-name">${entry.name}</div>
                <div class="history-item-meta">${entry.brand} &middot; ${timeAgo(entry.timestamp)}</div>
              </div>
              <div class="history-item-score">
                <div class="score-num" style="color:${scoreColor(entry.score)}">${entry.score}</div>
                <div class="score-grade">Grade ${entry.grade}</div>
              </div>
              <button class="delete-btn" onclick="removeEntry(${entry.id})" title="Remove">✕</button>
            </div>`).join("");
        }

        container.innerHTML = `
          <!-- Summary stats -->
          <div class="summary-row">
            <div class="stat-card">
              <div class="stat-label">Avg. Score This Week</div>
              <div class="stat-value" style="color:${scoreColor(summary.avgScore)}">${summary.avgScore}</div>
              <div class="stat-sub">out of 100</div>
              ${trendHtml}
            </div>
            <div class="stat-card blue">
              <div class="stat-label">Products Scanned</div>
              <div class="stat-value blue">${summary.totalScans}</div>
              <div class="stat-sub">this week</div>
            </div>
            <div class="stat-card amber">
              <div class="stat-label">Concerns Flagged</div>
              <div class="stat-value amber">${Object.values(summary.flagCounts).reduce((a, b) => a + b, 0)}</div>
              <div class="stat-sub">across all scans</div>
            </div>
          </div>

          <!-- Grade distribution + Scan activity -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
            <div class="section-card">
              <h3>Grade Distribution</h3>
              <div class="grade-bars">${gradeBarsHtml}</div>
            </div>
            <div class="section-card">
              <h3>Scan Activity (7 days)</h3>
              <div class="sparkline-wrap">${sparkHtml}</div>
            </div>
          </div>

          <!-- Concerns -->
          <div class="section-card" style="margin-bottom:20px">
            <h3>Common Concerns</h3>
            <div class="flags-grid">${flagsHtml}</div>
          </div>

          <!-- Best / Worst -->
          <div class="section-card" style="margin-bottom:28px">
            <h3>Best &amp; Worst This Week</h3>
            <div class="two-col">
              ${miniCard(summary.best, "🏆 Best scan")}
              ${miniCard(summary.worst, "⚠️ Worst scan")}
            </div>
          </div>

          <!-- Full history -->
          <div class="history-controls">
            <h3 style="font-size:0.8em;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted)">All Scans</h3>
            <button class="btn btn-ghost" onclick="confirmClear()">Clear history</button>
          </div>
          <div class="history-list" id="history-list">
            ${historyListHtml(visibleCount)}
          </div>
          ${allHistory.length > visibleCount ? `
            <div class="show-more-wrap">
              <button class="btn btn-ghost" id="show-more-btn" onclick="showMore()">Show more</button>
            </div>` : ""}
        `;

        // Store for show more
        window._visibleCount = visibleCount;
        window._allHistory = allHistory;
      }

      // ── Actions ───────────────────────────────────────────────────────────

      window.removeEntry = function (id) {
        HistoryModule.deleteEntry(id);
        render();
      };

      window.confirmClear = function () {
        if (confirm("Clear your entire scan history? This cannot be undone.")) {
          HistoryModule.clearHistory();
          render();
        }
      };

      window.showMore = function () {
        window._visibleCount += 10;
        const list = document.getElementById("history-list");
        list.innerHTML = window._allHistory.slice(0, window._visibleCount)
          .map((entry) => {
            const sc = scoreColor(entry.score);
            const thumb = entry.image
              ? `<img src="${entry.image}" alt="${entry.name}" onerror="this.style.display='none'">`
              : `<div class="no-img">📦</div>`;
            return `<div class="history-item" data-id="${entry.id}">
              ${thumb}
              <div class="history-item-info">
                <div class="history-item-name">${entry.name}</div>
                <div class="history-item-meta">${entry.brand}</div>
              </div>
              <div class="history-item-score">
                <div class="score-num" style="color:${sc}">${entry.score}</div>
                <div class="score-grade">Grade ${entry.grade}</div>
              </div>
              <button class="delete-btn" onclick="removeEntry(${entry.id})" title="Remove">✕</button>
            </div>`;
          }).join("");

        if (window._visibleCount >= window._allHistory.length) {
          const btn = document.getElementById("show-more-btn");
          if (btn) btn.parentElement.remove();
        }
      };

      // ── Init ──────────────────────────────────────────────────────────────
      render();
      updateShortlistBadge();

      // ── Tab switching ─────────────────────────────────────────────────────
      window.switchTab = function(tab) {
        const isHistory = tab === "history";
        document.getElementById("panel-history").style.display = isHistory ? "" : "none";
        document.getElementById("panel-shortlist").style.display = isHistory ? "none" : "";
        document.getElementById("tab-history").classList.toggle("active", isHistory);
        document.getElementById("tab-shortlist").classList.toggle("active", !isHistory);
        if (!isHistory) renderShortlist();
      };

      // ── Shortlist badge ───────────────────────────────────────────────────
      function updateShortlistBadge() {
        const count = ShortlistModule.getCount();
        const badge = document.getElementById("shortlist-count");
        if (!badge) return;
        badge.textContent = count;
        badge.className = `tab-count${count === 0 ? " zero" : ""}`;
      }

      // ── Shortlist render ──────────────────────────────────────────────────
      function renderShortlist() {
        const container = document.getElementById("shortlist-content");
        const list = ShortlistModule.getList();
        const summary = ShortlistModule.getSummary();

        if (list.length === 0) {
          container.innerHTML = `
            <div class="shortlist-empty">
              <div class="icon">⭐</div>
              <h3>Your shortlist is empty</h3>
              <p>After scanning a product, tap <strong>"Add to Shortlist"</strong> to save it here. Build a collection of your go-to sustainable products.</p>
              <a href="scan.html" class="btn" style="margin-top:16px;display:inline-block">📷 Start Scanning</a>
            </div>`;
          return;
        }

        // Summary stats
        const avgColor = scoreColor(summary.avgScore);
        const summaryHtml = `
          <div class="shortlist-summary">
            <div class="stat-card">
              <div class="stat-label">Saved Products</div>
              <div class="stat-value blue">${summary.total}</div>
              <div class="stat-sub">of 50 max</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Avg Score</div>
              <div class="stat-value" style="color:${avgColor}">${summary.avgScore}</div>
              <div class="stat-sub">out of 100</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Grade A Items</div>
              <div class="stat-value" style="color:var(--grade-a)">${summary.gradeCounts.A}</div>
              <div class="stat-sub">top performers</div>
            </div>
          </div>`;

        // Cards
        const cardsHtml = list.map(entry => {
          const color = scoreColor(entry.score);
          const imgHtml = entry.image
            ? `<img src="${entry.image}" alt="${entry.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
               <div class="no-img" style="display:none">📦</div>`
            : `<div class="no-img">📦</div>`;

          return `
            <div class="shortlist-card">
              <div class="shortlist-card-accent"></div>
              <button class="shortlist-remove" onclick="removeShortlistItem(${entry.id})" title="Remove from shortlist">✕</button>
              ${imgHtml}
              <div class="shortlist-card-body">
                <div class="shortlist-card-name">${entry.name}</div>
                <div class="shortlist-card-brand">${entry.brand}</div>
                <div class="shortlist-score-row">
                  <div class="shortlist-grade" style="background:${color}">${entry.grade}</div>
                  <div class="shortlist-score-bar-wrap">
                    <div class="shortlist-score-bar" style="width:${entry.score}%;background:${color}"></div>
                  </div>
                  <div class="shortlist-score-num" style="color:${color}">${entry.score}</div>
                </div>
              </div>
            </div>`;
        }).join("");

        container.innerHTML = `
          ${summaryHtml}
          <div class="shortlist-controls">
            <span class="shortlist-label">${list.length} saved product${list.length !== 1 ? "s" : ""}</span>
            <button class="btn btn-ghost" onclick="confirmClearShortlist()">Clear shortlist</button>
          </div>
          <div class="shortlist-grid">${cardsHtml}</div>`;
      }

      window.removeShortlistItem = function(id) {
        ShortlistModule.removeItem(id);
        updateShortlistBadge();
        renderShortlist();
      };

      window.confirmClearShortlist = function() {
        if (confirm("Clear your entire shortlist? This cannot be undone.")) {
          ShortlistModule.clearList();
          updateShortlistBadge();
          renderShortlist();
        }
      };

      // If URL has ?tab=shortlist open that tab directly
      if (new URLSearchParams(window.location.search).get("tab") === "shortlist") {
        switchTab("shortlist");
      }
    </script>
  </body>
</html>
