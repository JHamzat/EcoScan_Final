<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoScan Prototype</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 20px;
      }

      h1 {
        text-align: center;
        color: #2d5016;
        margin-bottom: 20px;
      }

      #scanner-container {
        max-width: 500px;
        margin: 0 auto 20px;
        background: #000;
        border-radius: 10px;
        overflow: hidden;
      }

      #video {
        width: 100%;
        display: block;
      }

      #result {
        max-width: 500px;
        margin: 0 auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        min-height: 60px;
        text-align: center;
      }

      .btn {
        display: block;
        margin: 20px auto;
        padding: 15px 30px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }

      .btn:hover {
        background: #45a049;
      }

      .success {
        color: #388e3c;
        padding: 15px;
        background: #e8f5e9;
        border-radius: 5px;
        margin-bottom: 10px;
      }

      .error {
        color: #d32f2f;
        padding: 15px;
        background: #ffebee;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <h1>🌱 EcoScan - Barcode Scanner</h1>

    <button id="startBtn" class="btn">Start Scanning</button>

    <div id="scanner-container" style="display: none">
      <video id="video" autoplay playsinline></video>
    </div>

    <div id="result"></div>

    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="script.js"></script>
  </body>
</html>
