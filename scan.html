<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoScan - Barcode Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --green-dark: #1a3a0a;
        --green-mid: #2d5016;
        --green-bright: #4caf50;
        --green-light: #e8f5e9;
        --amber: #ff9800;
        --red: #e53935;
        --text: #1c1c1c;
        --muted: #6b7280;
        --surface: #ffffff;
        --bg: #f4f7f2;
        --border: #e0e8dc;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        padding: 0;
        color: var(--text);
      }

      .header-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: white;
      }

      .header-brand h1 {
        font-family: "DM Serif Display", serif;
        font-size: 1.6em;
        margin: 0;
      }

      nav a {
        color: rgba(255, 255, 255, 0.85);
        text-decoration: none;
        margin-left: 20px;
        font-size: 0.9em;
        font-weight: 500;
        transition: color 0.2s;
      }

      nav a:hover,
      nav a.active {
        color: white;
      }

      #scanner-container {
        max-width: 500px;
        margin: 20px auto;
        background: #000;
        border-radius: 10px;
        overflow: hidden;
      }

      #video {
        width: 100%;
        display: block;
      }

      #result {
        max-width: 500px;
        margin: 0 auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        min-height: 60px;
        text-align: center;
      }

      .btn {
        display: block;
        margin: 20px auto;
        padding: 15px 30px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        width: fit-content;
      }

      .btn:hover {
        background: #45a049;
      }

      .success {
        color: #388e3c;
        padding: 15px;
        background: #e8f5e9;
        border-radius: 5px;
        margin-bottom: 10px;
      }

      .error {
        color: #d32f2f;
        padding: 15px;
        background: #ffebee;
        border-radius: 5px;
      }

      header {
        background: linear-gradient(
          135deg,
          var(--green-dark) 0%,
          var(--green-mid) 100%
        );
        color: white;
        padding: 18px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
      }

      .scan-content {
        padding: 16px;
      }

      /* ── Responsive ── */
      @media (max-width: 600px) {
        header {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
          padding: 14px 16px;
        }

        .header-brand h1 {
          font-size: 1.3em;
        }

        nav {
          display: flex;
          margin-top: 0;
        }

        nav a {
          margin-left: 0;
          margin-right: 14px;
          font-size: 0.82em;
        }

        #scanner-container {
          margin: 12px auto;
          border-radius: 8px;
          width: calc(100% - 24px);
        }

        #result {
          margin: 0 12px;
          padding: 16px;
          width: auto;
          max-width: none;
        }

        .btn {
          width: calc(100% - 24px);
          margin: 16px 12px;
          padding: 16px;
          font-size: 17px;
          border-radius: 10px;
        }
      }

      @media (min-width: 601px) and (max-width: 900px) {
        header h1 {
          font-size: 2em;
        }
        #scanner-container {
          width: 90%;
        }
        #result {
          width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a class="header-brand" href="index.html">
        <span>🌱</span>
        <h1>EcoScan</h1>
      </a>
      <nav>
        <a href="scan.html" class="active">Scan</a>
        <a href="history.html">My Impact</a>
        <a href="alternatives.html">Alternatives</a>
      </nav>
    </header>

    <div style="padding: 0 12px">
      <button id="startBtn" class="btn" style="width: 100%; max-width: 500px">
        Start Scanning
      </button>
    </div>

    <div id="scanner-container" style="display: none">
      <video id="video" autoplay playsinline></video>
    </div>

    <div id="result"></div>

    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="history.js"></script>
    <script src="scoring.js"></script>
    <script src="alternatives.js"></script>
    <script src="script.js"></script>
    <script>
      // Scanner Module - Barcode scanning logic
      const ScannerModule = (() => {
        const video = document.getElementById("video");
        const resultDiv = document.getElementById("result");
        const scannerContainer = document.getElementById("scanner-container");
        const startBtn = document.getElementById("startBtn");

        const codeReader = new ZXing.BrowserBarcodeReader();
        let isScanning = false;

        const init = () => {
          startBtn.addEventListener("click", startScanner);
        };

        const startScanner = async () => {
          try {
            resultDiv.innerHTML = "<p>Initializing camera...</p>";

            const videoInputDevices = await codeReader.listVideoInputDevices();

            if (videoInputDevices.length === 0) {
              throw new Error("No camera found on this device");
            }

            console.log("Found cameras:", videoInputDevices);

            const firstDeviceId = videoInputDevices[0].deviceId;

            scannerContainer.style.display = "block";
            startBtn.style.display = "none";
            resultDiv.innerHTML = "<p>📷 Point camera at a barcode...</p>";

            isScanning = true;

            codeReader.decodeFromVideoDevice(
              firstDeviceId,
              "video",
              (result, err) => {
                if (result && isScanning) {
                  console.log("Barcode detected:", result.text);
                  handleBarcode(result.text);

                  isScanning = false;
                  codeReader.reset();
                  scannerContainer.style.display = "none";
                }

                if (err && !(err instanceof ZXing.NotFoundException)) {
                  console.error("Scanner error:", err);
                }
              },
            );
          } catch (err) {
            console.error("Error starting scanner:", err);
            resultDiv.innerHTML = `
              <div class="error">
                <p><strong>Error:</strong> ${err.message}</p>
                <p>Make sure you've allowed camera access!</p>
              </div>
            `;
            startBtn.style.display = "block";
            scannerContainer.style.display = "none";
          }
        };

        const handleBarcode = (barcode) => {
          console.log("Processing barcode:", barcode);

          resultDiv.innerHTML = `
            <div class="success">
              <h3>✅ Barcode Scanned!</h3>
              <p><strong>Code:</strong> ${barcode}</p>
              <p>Fetching product information...</p>
            </div>
          `;

          fetchProductData(barcode);
        };

        const resetScanner = () => {
          startBtn.style.display = "block";
          scannerContainer.style.display = "none";
          resultDiv.innerHTML = "";
          isScanning = false;
        };

        return {
          init,
          startScanner,
          handleBarcode,
          resetScanner,
          getResultDiv: () => resultDiv,
          getStartBtn: () => startBtn,
        };
      })();

      // Initialize scanner on page load
      document.addEventListener("DOMContentLoaded", ScannerModule.init);
    </script>
  </body>
</html>
